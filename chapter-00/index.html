<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 00</title>
    <style>

        *{
            margin: 0px;
            padding: 0;
            box-sizing: border-box;
        }

        .container{
            display: flex;
            position: relative;
            flex-direction: column;
            justify-items: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: rgb(255, 255, 255);
            gap: 40px;
        }

        .btn{
            width: 100px;
            height: 50px;
            justify-items: center;
            align-items: center;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }



    </style>
</head>

<body>
    <div class="container">
    <button class="btn" id="btn">Click Me</button>
    <p id="text">안녕!</p>
    </div>
    
    <script src = "index.js"></script>
</body>
</html>
